name: Update Anki Deck

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "*.png"
      - "*.svg"
      - "*.jpg"
      - "*.jpeg"
      - "scripts/build_anki_deck.py"
      - ".github/workflows/update-anki-deck.yml"
  push:
    branches:
      - main
    paths:
      - "*.png"
      - "*.svg"
      - "*.jpg"
      - "*.jpeg"
      - "scripts/build_anki_deck.py"
      - ".github/workflows/update-anki-deck.yml"

concurrency:
  group: update-anki-deck-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-deck:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install genanki

      - name: Rebuild deck
        run: python scripts/build_anki_deck.py

      - name: Ensure generated deck is up to date
        run: git diff --exit-code -- dist/irish-road-signs.apkg

  update-deck:
    if: github.event_name != 'pull_request' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install genanki

      - name: Rebuild deck
        run: python scripts/build_anki_deck.py

      - name: Commit updated deck if needed
        run: |
          if git diff --quiet -- dist/irish-road-signs.apkg; then
            echo "Deck already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/irish-road-signs.apkg
          git commit -m "Update generated Anki deck"
          git pull --rebase origin main
          python scripts/build_anki_deck.py
          if ! git diff --quiet -- dist/irish-road-signs.apkg; then
            git add dist/irish-road-signs.apkg
            git commit --amend --no-edit
          fi
          git push
