name: Build Anki Deck

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install genanki

      - name: Build Anki deck
        run: python build_deck.py

      - name: Upload Anki deck
        uses: actions/upload-artifact@v4
        with:
          name: irish-road-signs-anki-deck
          path: irish_road_signs.apkg
